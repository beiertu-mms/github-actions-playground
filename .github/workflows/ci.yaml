name: ci
on: push

env:
  IMAGE_NAME: "eu.gcr.io/mms-olm-cos-cicd-x-3929/digital-article-activation-service"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Create docker image
        env:
          IMAGE: ${IMAGE_NAME}:${GITHUB_REF##*/}.${{github.run_number}}
        run: |
          echo build with ${{ env.IMAGE }}
          # docker build and push
          docker build -t ${{ env.IMAGE }} .

