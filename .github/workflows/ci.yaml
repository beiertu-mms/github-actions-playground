name: ci
on: push

env:
  TAG: "${{GITHUB_REF##*/}}.${{github.run_number}}"
  IMAGE: "eu.gcr.io/mms-olm-cos-cicd-x-3929/digital-article-activation-service:$TAG"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Create docker image
        run: |
          echo $TAG
          # docker build and push
          docker build -t ${IMAGE} .

